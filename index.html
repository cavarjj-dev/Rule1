<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ICT Trading System — Account Dashboard</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@2.44.0/tabler-icons.min.css">
<style>
:root{
  --bg:#0b0f1a;--s1:#131825;--s2:#1a2030;--s3:#212840;
  --b1:rgba(255,255,255,.06);--b2:rgba(255,255,255,.11);--b3:rgba(255,255,255,.22);
  --t1:#dde4f0;--t2:#8b95a8;--t3:#4a5270;
  --ok:#34d399;--bad:#f87171;--warn:#fbbf24;--info:#60a5fa;
  --font:'DM Sans',-apple-system,BlinkMacSystemFont,sans-serif;
  --mono:'JetBrains Mono','Fira Code',monospace;
  --r:10px;--rl:14px;
}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:var(--font);background:var(--bg);color:var(--t1);min-height:100vh;font-size:14px;line-height:1.5}
header{background:var(--s1);border-bottom:1px solid var(--b2);padding:0 1.25rem;height:54px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:200}
.logo{display:flex;align-items:center;gap:10px}
.logo-icon{width:32px;height:32px;border-radius:8px;background:linear-gradient(135deg,#a78bfa,#60a5fa);display:flex;align-items:center;justify-content:center;color:#fff;font-size:15px;flex-shrink:0}
.logo-name{font-size:14px;font-weight:500}
.logo-sub{font-size:10px;color:var(--t2);margin-top:-1px}
.header-r{display:flex;align-items:center;gap:10px}
.amd-pill{font-size:11px;font-weight:500;padding:3px 9px;border-radius:6px;background:rgba(96,165,250,.12);color:#60a5fa;transition:all .5s}
.clock{font-size:12px;font-family:var(--mono);color:var(--t2)}
.saved-lbl{font-size:11px;color:var(--t3);display:flex;align-items:center;gap:5px}
.saved-dot{width:6px;height:6px;border-radius:50%;background:var(--ok);opacity:0;transition:opacity .3s}
.saved-dot.lit{opacity:.8}
.wrap{display:grid;grid-template-columns:222px minmax(0,1fr);height:calc(100vh - 54px)}
.sidebar{background:var(--s1);border-right:1px solid var(--b2);padding:1rem;overflow-y:auto;display:flex;flex-direction:column;gap:0}
.s-hdr{font-size:10px;font-weight:500;color:var(--t3);text-transform:uppercase;letter-spacing:.1em;display:flex;align-items:center;justify-content:space-between;margin-bottom:8px}
.ov-btn{width:100%;padding:9px 11px;border-radius:var(--r);cursor:pointer;border:1px solid var(--b2);background:transparent;color:var(--t2);font-family:var(--font);font-size:12px;display:flex;align-items:center;gap:7px;margin-bottom:8px;transition:all .1s;text-align:left}
.ov-btn:hover,.ov-btn.on{background:var(--s2);color:var(--t1);border-color:var(--b3)}
.ov-btn.on{border-left:3px solid var(--info);padding-left:9px}
.bundle-hdr{display:flex;align-items:center;gap:5px;padding:5px 4px 5px 2px;cursor:pointer;border-radius:6px;margin-bottom:2px}
.bundle-hdr:hover{background:rgba(255,255,255,.04)}
.bundle-name{font-size:11px;font-weight:500;color:var(--t2);flex:1;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.acct{padding:8px 10px;border-radius:var(--r);cursor:pointer;border:1px solid transparent;border-left-width:3px;margin-bottom:3px;transition:background .1s}
.acct:hover{background:var(--s2)}
.acct.on{background:var(--s2);border-color:var(--b2);border-left-color:inherit}
.a-name{font-size:12px;font-weight:500;color:var(--t1);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:130px}
.a-meta{display:flex;align-items:center;justify-content:space-between;margin-top:4px;padding-left:12px}
.pbadge{font-size:10px;font-weight:500;padding:1px 7px;border-radius:5px}
.apnl{font-size:11px;font-family:var(--mono)}
.minip{height:2px;border-radius:2px;background:var(--b2);margin-top:5px;overflow:hidden}
.minif{height:100%;border-radius:2px;transition:width .3s}
.add-btn{width:100%;padding:7px;font-size:12px;cursor:pointer;border-radius:var(--r);border:1px dashed var(--b3);background:transparent;color:var(--t2);font-family:var(--font);display:flex;align-items:center;justify-content:center;gap:5px;margin-top:4px;transition:all .12s}
.add-btn:hover{background:var(--s2);color:var(--t1)}
.content{overflow-y:auto;padding:1.5rem}
.card{background:var(--s1);border:1px solid var(--b2);border-radius:var(--rl);padding:1rem 1.1rem}
.card-top{border-top-width:2px}
.metric{background:var(--s2);border-radius:var(--r);padding:.6rem .85rem}
.lbl{font-size:10px;font-weight:500;color:var(--t2);text-transform:uppercase;letter-spacing:.08em;margin-bottom:2px}
.num{font-size:21px;font-weight:500;font-family:var(--mono);line-height:1.2}
.prog{height:5px;background:var(--b2);border-radius:3px;overflow:hidden}
.progf{height:100%;border-radius:3px;transition:width .4s cubic-bezier(.4,0,.2,1)}
.rrow{display:flex;align-items:flex-start;gap:8px;padding:7px 0;border-bottom:1px solid var(--b1);font-size:13px}
.rrow:last-child{border-bottom:none}
.stag{font-size:9px;font-weight:500;padding:1px 5px;border-radius:4px;margin-left:5px;vertical-align:middle}
.stag.live{background:rgba(52,211,153,.15);color:var(--ok)}
.stag.base{background:rgba(255,255,255,.07);color:var(--t3)}
.pill{background:var(--s2);border:1px solid var(--b2);border-radius:var(--r);padding:7px 11px;font-size:12px;margin-bottom:5px;display:flex;align-items:center;gap:7px}
.stepper{background:var(--s2);border:1px solid var(--b2);border-radius:var(--r);padding:7px 10px;flex:1}
.s-lbl{font-size:10px;color:var(--t2);text-transform:uppercase;letter-spacing:.07em;margin-bottom:6px}
.s-ctrl{display:flex;align-items:center;justify-content:space-between;gap:6px}
.s-btn{width:28px;height:28px;border-radius:6px;border:1px solid var(--b3);background:var(--s3);color:var(--t1);cursor:pointer;font-size:18px;display:flex;align-items:center;justify-content:center;transition:background .1s;flex-shrink:0;font-family:var(--font);line-height:1}
.s-btn:hover{background:var(--b3)}
.s-val{font-family:var(--mono);font-size:20px;font-weight:500;color:var(--t1);min-width:26px;text-align:center}
.preset-btn{padding:3px 9px;font-size:11px;cursor:pointer;border-radius:6px;border:1px solid var(--b2);background:transparent;color:var(--t2);font-family:var(--font);transition:all .1s}
.preset-btn:hover{background:var(--s3);color:var(--t1)}
.exp-bar{background:var(--s2);border-radius:var(--r);padding:7px 10px;font-size:12px;color:var(--t2);display:flex;align-items:center;justify-content:space-between;margin-bottom:6px;gap:8px;flex-wrap:wrap}
.btn{padding:7px 14px;font-size:13px;cursor:pointer;border-radius:var(--r);border:1px solid var(--b3);background:transparent;color:var(--t1);font-family:var(--font);display:inline-flex;align-items:center;gap:5px;transition:background .1s}
.btn:hover{background:var(--s3)}
.xs{padding:4px 8px;font-size:11px;cursor:pointer;border-radius:var(--r);border:1px solid var(--b2);background:transparent;color:var(--t2);font-family:var(--font);display:inline-flex;align-items:center;gap:4px;transition:background .1s}
.xs:hover{background:var(--s3);color:var(--t1)}
.icon-btn{width:30px;height:30px;border-radius:var(--r);border:1px solid var(--b2);background:transparent;color:var(--t2);cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:15px;transition:background .1s}
.icon-btn:hover{background:var(--s3);color:var(--t1)}
.trow{display:flex;align-items:center;justify-content:space-between;padding:5px 0;border-bottom:1px solid var(--b1);font-size:12px;gap:6px}
.trow:last-child{border-bottom:none}
.ov-tbl{width:100%;border-collapse:collapse;font-size:12px}
.ov-tbl th{font-size:10px;font-weight:500;color:var(--t3);text-transform:uppercase;letter-spacing:.07em;padding:6px 10px;text-align:left;border-bottom:1px solid var(--b2)}
.ov-tbl td{padding:8px 10px;border-bottom:1px solid var(--b1);vertical-align:middle}
.ov-tbl tr:last-child td{border-bottom:none}
.ov-tbl tr:hover td{background:var(--s2);cursor:pointer}
.tag-pill{font-size:9px;padding:1px 6px;border-radius:4px;font-weight:500;white-space:nowrap}
input,select{background:var(--s2);border:1px solid var(--b2);border-radius:var(--r);color:var(--t1);padding:7px 10px;font-family:var(--font);font-size:13px;outline:none;transition:border-color .12s}
input:focus,select:focus{border-color:var(--b3)}
select option{background:var(--s2)}
input[type=checkbox]{width:14px;height:14px;cursor:pointer;accent-color:var(--info)}
.pgrid{display:grid;grid-template-columns:repeat(auto-fit,minmax(140px,1fr));gap:1rem}
.toast{position:fixed;bottom:24px;right:24px;background:var(--s1);border:1px solid var(--b2);border-radius:var(--r);padding:10px 16px;font-size:12px;color:var(--t2);display:flex;align-items:center;gap:8px;transform:translateY(80px);opacity:0;transition:all .25s;z-index:999}
.toast.show{transform:translateY(0);opacity:1}
::-webkit-scrollbar{width:5px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:var(--b3);border-radius:3px}
@media(max-width:720px){.wrap{grid-template-columns:1fr}.sidebar{display:none}}
</style>
</head>
<body>
<header>
  <div class="logo">
    <div class="logo-icon"><i class="ti ti-chart-candle" aria-hidden="true"></i></div>
    <div><div class="logo-name">ICT Trading System</div><div class="logo-sub">Account Dashboard — Julian's Rules</div></div>
  </div>
  <div class="header-r">
    <div class="amd-pill" id="amd">—</div>
    <div class="clock" id="clk">—</div>
    <button class="icon-btn" onclick="showTagMgr()" title="Manage tags"><i class="ti ti-tag" aria-hidden="true"></i></button>
    <button class="icon-btn" onclick="backupData()" title="Backup data to file"><i class="ti ti-download" aria-hidden="true"></i></button>
    <label class="icon-btn" title="Restore from backup" style="cursor:pointer"><i class="ti ti-upload" aria-hidden="true"></i><input type="file" accept=".json" onchange="restoreData(this)" style="display:none"></label>
    <div class="saved-lbl"><span class="saved-dot" id="dot"></span>Saved</div>
  </div>
</header>
<div class="wrap">
  <div class="sidebar">
    <div class="s-hdr"><span>Accounts</span><span id="acnt" style="font-size:10px;color:var(--t3)">—</span></div>
    <button class="ov-btn" id="ovbtn" onclick="showOv()"><i class="ti ti-layout-dashboard" aria-hidden="true"></i> Overview &amp; statistics</button>
    <div id="alist"></div>
    <div style="display:flex;flex-direction:column;gap:3px;margin-top:4px">
      <button class="add-btn" id="addbtn" onclick="showAdd()"><i class="ti ti-plus" aria-hidden="true"></i> Add account</button>
      <button class="add-btn" id="bndbtn" onclick="showNewBundle()"><i class="ti ti-folders" aria-hidden="true"></i> Add bundle</button>
    </div>
  </div>
  <div class="content" id="panel"><div style="padding:3rem;text-align:center;color:var(--t2)"><i class="ti ti-loader" style="font-size:24px;display:block;margin-bottom:12px" aria-hidden="true"></i>Loading&hellip;</div></div>
</div>
<div class="toast" id="toast"><i class="ti ti-device-floppy" style="font-size:14px;color:var(--ok)" aria-hidden="true"></i>Saved to IndexedDB</div>

<script>
// ─── Constants ───────────────────────────────────────────────
const PC={caution:'#f87171',1:'#a78bfa',2:'#f59e0b',3:'#34d399'};
const PBG={caution:'rgba(248,113,113,.13)',1:'rgba(167,139,250,.13)',2:'rgba(245,158,11,.13)',3:'rgba(52,211,153,.13)'};
const PTX={caution:'#fca5a5',1:'#c4b5fd',2:'#fcd34d',3:'#6ee7b7'};
const TAG_COLORS=['#34d399','#f87171','#fbbf24','#a78bfa','#60a5fa','#f97316','#e879f9','#94a3b8'];
const DEFS={eval:{balance:50000,profitTarget:3000,maxDrawdown:2500,dailyLimit:1500},paper:{balance:100000,profitTarget:28000,maxDrawdown:50000,dailyLimit:1500},live:{balance:10000,profitTarget:5000,maxDrawdown:2000,dailyLimit:500},custom:{balance:50000,profitTarget:3000,maxDrawdown:2500,dailyLimit:1500}};

// ─── State ───────────────────────────────────────────────────
let S={
  accounts:[
    {id:1,name:'Eval #1 — Prop Firm',type:'eval',balance:50000,profitTarget:3000,maxDrawdown:2500,dailyLimit:1500,totalPnl:0,dailyPnl:0,tradingDays:1,consecutiveLosses:0,trades:[]},
    {id:2,name:'Paper — $100K',type:'paper',balance:100000,profitTarget:28000,maxDrawdown:50000,dailyLimit:1500,totalPnl:-13000,dailyPnl:0,tradingDays:1,consecutiveLosses:0,trades:[]},
  ],
  bundles:[],  // [{id,name,accountIds,primaryId,collapsed}]
  tags:[],     // [{id,name,color}]
  sel:1, nextId:3, nextBundleId:1, nextTagId:1, nextTradeId:100,
  mode:'dash',
  entry:{mnq:2,nq:0},
  nw:{name:'',type:'eval',...DEFS.eval},
  ed:null,
  editTrade:null,  // {accountId,tradeId,win,pnl,contracts,tags}
  newBundle:{name:'',accountIds:[],primaryId:null},
  editBundle:null,
  newTagName:'', newTagColor:TAG_COLORS[0],
};

// ─── IndexedDB ───────────────────────────────────────────────
let db;
async function initDB(){
  return new Promise((res,rej)=>{
    const req=indexedDB.open('ICT_Dashboard_v2',1);
    req.onupgradeneeded=e=>{const d=e.target.result;if(!d.objectStoreNames.contains('kv'))d.createObjectStore('kv');};
    req.onsuccess=e=>{db=e.target.result;res();};
    req.onerror=()=>rej(req.error);
  });
}
async function dbSet(k,v){
  return new Promise((res,rej)=>{const tx=db.transaction('kv','readwrite');tx.objectStore('kv').put(v,k);tx.oncomplete=res;tx.onerror=()=>rej(tx.error);});
}
async function dbGet(k){
  return new Promise(res=>{const tx=db.transaction('kv','readonly');const r=tx.objectStore('kv').get(k);r.onsuccess=()=>res(r.result);r.onerror=()=>res(null);});
}

// ─── Helpers ─────────────────────────────────────────────────
const ga=(id)=>S.accounts.find(a=>a.id===(id||S.sel));
const fm=(n)=>(n<0?'-$':'$')+Math.abs(Math.round(n)).toLocaleString();
const fp=(n)=>(n*100).toFixed(1)+'%';
const pp=(a)=>Math.min(100,Math.max(0,Math.round((a.totalPnl/a.profitTarget)*100)));
const pl=(p)=>p==='caution'?'Warning':'Phase '+p;
const fc=(n)=>n>=0?'var(--ok)':'var(--bad)';
const esc=(s)=>String(s||'').replace(/&/g,'&amp;').replace(/"/g,'&quot;').replace(/</g,'&lt;');

function gp(a){
  if(!a)return 1;
  if(a.consecutiveLosses>0)return'caution';
  if(a.tradingDays<=3||a.totalPnl<750)return 1;
  if(a.totalPnl>=a.profitTarget)return 3;
  return 2;
}

function recalc(a){
  a.totalPnl=Math.round(a.trades.reduce((s,t)=>s+t.pnl,0));
  const today=new Date().toDateString();
  a.dailyPnl=Math.round(a.trades.filter(t=>t.ts&&new Date(t.ts).toDateString()===today).reduce((s,t)=>s+t.pnl,0));
  let cl=0;
  for(let i=a.trades.length-1;i>=0;i--){if(!a.trades[i].win)cl++;else break;}
  a.consecutiveLosses=cl;
}

function calcStats(a){
  const W=a.trades.filter(t=>t.win),L=a.trades.filter(t=>!t.win);
  const nW=W.length,nL=L.length,nT=a.trades.length;
  const avgW=nW?W.reduce((s,t)=>s+Math.abs(t.pnl),0)/nW:250;
  const avgL=nL?L.reduce((s,t)=>s+Math.abs(t.pnl),0)/nL:60;
  const wr=nT?nW/nT:null;
  const beWR=avgL/(avgL+avgW);
  return{nW,nL,nT,avgW,avgL,wr,beWR,lToDD:a.maxDrawdown/avgL,isBase:nT<3};
}

function calcExp(mnq,nq,pts=14){return mnq*2*pts+nq*20*pts;}
function conLabel(){const{mnq,nq}=S.entry;if(!mnq&&!nq)return'(none)';const p=[];if(mnq)p.push(mnq+' MNQ');if(nq)p.push(nq+' NQ');return p.join(' + ');}
function phOK(p){const{mnq,nq}=S.entry;if(p==='caution')return mnq<=1&&nq===0;if(p===1)return mnq<=2&&nq===0;if(p===3)return nq===0;return true;}
function adj(f,d){if(f==='mnq')S.entry.mnq=Math.max(0,Math.min(10,S.entry.mnq+d));else S.entry.nq=Math.max(0,Math.min(3,S.entry.nq+d));renderPanel();}
function setPreset(m,n){S.entry.mnq=m;S.entry.nq=n;renderPanel();}

// ─── Storage ─────────────────────────────────────────────────
let saveT;
function save(){
  clearTimeout(saveT);
  saveT=setTimeout(async()=>{
    try{
      await dbSet('accounts',S.accounts);
      await dbSet('meta',{sel:S.sel,nextId:S.nextId,nextBundleId:S.nextBundleId,nextTagId:S.nextTagId,nextTradeId:S.nextTradeId,bundles:S.bundles,tags:S.tags});
      // localStorage as secondary backup
      localStorage.setItem('ict-bk',JSON.stringify({a:S.accounts,m:{sel:S.sel,nextId:S.nextId,nextBundleId:S.nextBundleId,nextTagId:S.nextTagId,nextTradeId:S.nextTradeId,bundles:S.bundles,tags:S.tags}}));
      flash();
    }catch(e){console.error('Save error:',e);}
  },400);
}

async function load(){
  try{
    const a=await dbGet('accounts');
    const m=await dbGet('meta');
    if(a&&a.length)S.accounts=a;
    if(m){if(m.sel)S.sel=m.sel;if(m.nextId)S.nextId=m.nextId;if(m.nextBundleId)S.nextBundleId=m.nextBundleId;if(m.nextTagId)S.nextTagId=m.nextTagId;if(m.nextTradeId)S.nextTradeId=m.nextTradeId;if(m.bundles)S.bundles=m.bundles;if(m.tags)S.tags=m.tags;}
  }catch(e){
    try{const bk=localStorage.getItem('ict-bk');if(bk){const d=JSON.parse(bk);if(d.a&&d.a.length)S.accounts=d.a;if(d.m){Object.assign(S,{sel:d.m.sel,nextId:d.m.nextId,nextBundleId:d.m.nextBundleId,nextTagId:d.m.nextTagId,nextTradeId:d.m.nextTradeId,bundles:d.m.bundles||[],tags:d.m.tags||[]});}}}catch(e2){}
  }
  // Ensure all trades have IDs and tags array
  let needsSave=false;
  S.accounts.forEach(a=>{
    a.trades.forEach(t=>{
      if(!t.id){t.id='t'+( S.nextTradeId++);needsSave=true;}
      if(!t.tags)t.tags=[];
    });
  });
  if(!ga())S.sel=S.accounts[0]?.id||1;
  if(needsSave)save();
}

let toastT;
function flash(){const dot=document.getElementById('dot'),t=document.getElementById('toast');dot.classList.add('lit');t.classList.add('show');clearTimeout(toastT);toastT=setTimeout(()=>{dot.classList.remove('lit');t.classList.remove('show');},2200);}

// ─── Backup / Restore ────────────────────────────────────────
function backupData(){
  const data={version:'5.0',exportDate:new Date().toISOString().split('T')[0],accounts:S.accounts,bundles:S.bundles,tags:S.tags,meta:{sel:S.sel,nextId:S.nextId,nextBundleId:S.nextBundleId,nextTagId:S.nextTagId,nextTradeId:S.nextTradeId}};
  const url=URL.createObjectURL(new Blob([JSON.stringify(data,null,2)],{type:'application/json'}));
  const lk=document.createElement('a');lk.href=url;lk.download='ict-trading-backup-'+new Date().toISOString().split('T')[0]+'.json';lk.click();URL.revokeObjectURL(url);
}
function restoreData(input){
  const file=input.files[0];if(!file)return;
  const reader=new FileReader();
  reader.onload=e=>{
    try{
      const d=JSON.parse(e.target.result);
      if(d.accounts){S.accounts=d.accounts;}
      if(d.bundles)S.bundles=d.bundles;
      if(d.tags)S.tags=d.tags;
      if(d.meta){Object.assign(S,{sel:d.meta.sel||1,nextId:d.meta.nextId||S.nextId,nextBundleId:d.meta.nextBundleId||1,nextTagId:d.meta.nextTagId||1,nextTradeId:d.meta.nextTradeId||100});}
      if(!ga())S.sel=S.accounts[0]?.id||1;
      save();render();alert('Data restored successfully from backup.');
    }catch(err){alert('Failed to restore — invalid backup file.');}
  };
  reader.readAsText(file);
  input.value='';
}

// ─── CSV Export ──────────────────────────────────────────────
function dl(rows,name){const url=URL.createObjectURL(new Blob([rows.map(r=>r.join(',')).join('\n')],{type:'text/csv'}));const lk=document.createElement('a');lk.href=url;lk.download=name+'_'+new Date().toISOString().split('T')[0]+'.csv';lk.click();URL.revokeObjectURL(url);}
function exportCSV(){
  const a=ga();if(!a?.trades.length){alert('No trades logged yet.');return;}
  let run=0;
  const rows=[['Trade','Date','Time','Account','Type','Result','Contracts','Phase','Tags','P&L ($)','Running Total ($)']];

// ─── Clock ───────────────────────────────────────────────────
function tick(){
  const now=new Date();
  document.getElementById('clk').textContent='NY '+new Intl.DateTimeFormat('en-US',{timeZone:'America/New_York',hour:'2-digit',minute:'2-digit',second:'2-digit',hour12:false}).format(now);
  const nyH=+new Intl.DateTimeFormat('en-US',{timeZone:'America/New_York',hour:'2-digit',hour12:false}).format(now);
  const nyM=+new Intl.DateTimeFormat('en-US',{timeZone:'America/New_York',minute:'2-digit'}).format(now);
  const hm=nyH*100+nyM;
  let ph='Off-Hours',cl='rgba(255,255,255,.07)',tx='var(--t3)';
  if(hm>=2000||hm<200){ph='Accumulation';cl='rgba(167,139,250,.12)';tx='#c4b5fd';}
  else if(hm<830){ph='Manipulation';cl='rgba(245,158,11,.12)';tx='#fcd34d';}
  else if(hm<1200){ph='Distribution — AM';cl='rgba(52,211,153,.12)';tx='#6ee7b7';}
  else if(hm<1300){ph='Lunch — low prob';cl='rgba(248,113,113,.12)';tx='#fca5a5';}
  else if(hm<1600){ph='Distribution — PM';cl='rgba(52,211,153,.12)';tx='#6ee7b7';}
  const el=document.getElementById('amd');el.textContent=ph;el.style.background=cl;el.style.color=tx;
}
setInterval(tick,1000);tick();

// ─── Trade CRUD ──────────────────────────────────────────────
function addTrade(){
  const a=ga();if(!a)return;
  const res=document.getElementById('tr').value;
  const raw=parseFloat(document.getElementById('tp').value);
  if(isNaN(raw)||raw<=0)return;
  const pnl=res==='win'?Math.round(raw):-Math.round(raw);
  const tid='t'+( S.nextTradeId++);
  // Collect selected tags from checkboxes
  const selTags=S.tags.filter(tg=>document.getElementById('chk-'+tg.id)?.checked).map(tg=>tg.id);
  a.trades.push({id:tid,win:res==='win',pnl,contracts:conLabel(),ts:Date.now(),phase:pl(gp(a)),tags:selTags});
  a.dailyPnl=Math.round(a.dailyPnl+pnl);
  a.totalPnl=Math.round(a.totalPnl+pnl);
  a.consecutiveLosses=res==='loss'?a.consecutiveLosses+1:0;
  document.getElementById('tp').value='';
  save();render();
}

function showEditTrade(accountId,tradeId){
  const a=ga(accountId);if(!a)return;
  const t=a.trades.find(x=>x.id===tradeId);if(!t)return;
  S.mode='editTrade';
  S.editTrade={accountId,tradeId,win:t.win,pnl:Math.abs(t.pnl),contracts:t.contracts,tags:[...(t.tags||[])]};
  renderPanel();
}
function cancelEditTrade(){S.mode='dash';S.editTrade=null;renderPanel();}
function toggleEditTag(tagId){
  if(!S.editTrade)return;
  const idx=S.editTrade.tags.indexOf(tagId);
  if(idx>=0)S.editTrade.tags.splice(idx,1);else S.editTrade.tags.push(tagId);
  renderPanel();
}
function saveEditTrade(){
  const et=S.editTrade;if(!et)return;
  const a=ga(et.accountId);if(!a)return;
  const t=a.trades.find(x=>x.id===et.tradeId);if(!t)return;
  t.win=et.win;
  t.pnl=et.win?Math.abs(Math.round(et.pnl)):-Math.abs(Math.round(et.pnl));
  t.contracts=et.contracts;
  t.tags=et.tags;

  S.mode='dash';S.editTrade=null;

}

// ─── Overview ─────────────────────────────────────────────────
function renderChart(accs){
  const actives=accs.filter(a=>a.trades.length>1);
  if(!actives.length)return`<div style="text-align:center;color:var(--t3);padding:2rem;font-size:12px">Log at least 2 trades on any account to see the P&L chart</div>`;
  const W=600,H=160,PX=44,PY=18;
  const series=actives.map(a=>{let r=0;return{name:a.name,color:PC[gp(a)],pts:a.trades.map((t,i)=>{r+=t.pnl;return{x:i,y:r};})};});
  const maxN=Math.max(...series.map(s=>s.pts.length))-1||1;
  const allY=series.flatMap(s=>s.pts.map(p=>p.y));
  const minY=Math.min(...allY,0),maxY=Math.max(...allY,0),rY=maxY-minY||100;
  const IW=W-2*PX,IH=H-2*PY,sx=n=>PX+(n/maxN)*IW,sy=v=>H-PY-((v-minY)/rY)*IH,z=sy(0);
  let svg=`<svg width="${W}" height="${H}" viewBox="0 0 ${W} ${H}" style="width:100%;overflow:visible">`;
  svg+=`<line x1="${PX}" y1="${z}" x2="${W-PX}" y2="${z}" stroke="rgba(255,255,255,.1)" stroke-dasharray="4,3"/>`;
  series.forEach(s=>{
    const d=s.pts.map((p,i)=>`${i?'L':'M'}${sx(p.x).toFixed(1)},${sy(p.y).toFixed(1)}`).join('');
    svg+=`<path d="${d}" fill="none" stroke="${s.color}" stroke-width="1.5" stroke-linejoin="round"/>`;
    const lp=s.pts[s.pts.length-1];const lx=sx(lp.x),ly=sy(lp.y);
    const anc=lx>W-100?'end':'start';
    svg+=`<circle cx="${lx.toFixed(1)}" cy="${ly.toFixed(1)}" r="3.5" fill="${s.color}"/>`;
    svg+=`<text x="${(lx+(anc==='end'?-8:8)).toFixed(1)}" y="${(ly+4).toFixed(1)}" font-size="9.5" fill="${s.color}" text-anchor="${anc}" font-family="DM Sans,sans-serif">${esc(s.name.split('—')[0].trim())}</text>`;
  });
  return svg+'</svg>';
}

          <div style="display:grid;grid-template-columns:1fr 1fr;gap:5px">
            <div><div style="font-size:9px;color:var(--t3)">Bundle P&L</div><div style="font-size:14px;font-family:var(--mono);color:${fc(btPnl)}">${fm(btPnl)}</div></div>

    </div>
    <div style="overflow-x:auto">${renderChart(all)}</div>
    <div style="display:flex;flex-wrap:wrap;gap:10px;margin-top:10px">
      ${all.map(a=>`<div style="display:flex;align-items:center;gap:5px;font-size:11px;color:var(--t2)"><span style="width:10px;height:2px;border-radius:1px;background:${PC[gp(a)]};display:inline-block"></span>${esc(a.name)}</div>`).join('')}

        <td style="font-family:var(--mono);color:${fc(a.dailyPnl)}">${fm(a.dailyPnl)}</td>
        <td style="color:var(--t2)">${st.nT}</td>

}

    <div class="pgrid">
      <div><div style="font-size:11px;font-weight:500;color:#c4b5fd;margin-bottom:6px;display:flex;align-items:center;gap:3px"><i class="ti ti-number-1" aria-hidden="true"></i> Phase 1</div><div style="font-size:12px;color:var(--t2);line-height:1.7">2 MNQ only<br>Days 1–3 or &lt;$750<br>No e-minis<br>Stop at daily limit</div></div>
      <div><div style="font-size:11px;font-weight:500;color:#fcd34d;margin-bottom:6px;display:flex;align-items:center;gap:3px"><i class="ti ti-number-2" aria-hidden="true"></i> Phase 2</div><div style="font-size:12px;color:var(--t2);line-height:1.7">2 MNQ + 1 NQ<br>Or 3–4 micros<br>$750 to target<br>Stop at daily limit</div></div>
      <div><div style="font-size:11px;font-weight:500;color:#6ee7b7;margin-bottom:6px;display:flex;align-items:center;gap:3px"><i class="ti ti-number-3" aria-hidden="true"></i> Phase 3</div><div style="font-size:12px;color:var(--t2);line-height:1.7">2–4 MNQ only<br>Target reached<br>Protect the gain<br>No e-minis here</div></div>
      <div><div style="font-size:11px;font-weight:500;color:#fca5a5;margin-bottom:6px;display:flex;align-items:center;gap:3px"><i class="ti ti-alert-triangle" aria-hidden="true"></i> After any loss</div><div style="font-size:12px;color:var(--t2);line-height:1.7">1 micro next trade<br>Win first, reassess<br>No e-minis<br>Then resume phase</div></div>
    </div>
  </div>`;
}

// ─── Panel router ─────────────────────────────────────────────
function renderPanel(){
  const el=document.getElementById('panel');
  if(S.mode==='ov'){el.innerHTML=renderOv();return;}
  if(S.mode==='tagMgr'){el.innerHTML=renderTagMgr();return;}
  if(S.mode==='editTrade'){el.innerHTML=renderEditTradePanel();return;}
  if(S.mode==='newBundle'){el.innerHTML=`<div class="card" style="max-width:440px"><div style="font-size:16px;font-weight:500;margin-bottom:1.1rem">New bundle</div>${bundleFlds('new')}<div style="display:flex;gap:8px;margin-top:1.1rem"><button onclick="cancelNewBundle()" class="btn" style="flex:1;justify-content:center;color:var(--t2)">Cancel</button><button onclick="createBundle()" class="btn" style="flex:2;justify-content:center;font-weight:500">Create bundle</button></div></div>`;return;}
  if(S.mode==='editBundle'){el.innerHTML=`<div class="card" style="max-width:440px"><div style="font-size:16px;font-weight:500;margin-bottom:1.1rem">Edit bundle</div>${bundleFlds('edit')}<div style="display:flex;gap:8px;margin-top:1.1rem"><button onclick="cancelEditBundle()" class="btn" style="flex:1;justify-content:center;color:var(--t2)">Cancel</button><button onclick="saveBundleEdit()" class="btn" style="flex:2;justify-content:center;font-weight:500">Save changes</button></div></div>`;return;}
  if(S.mode==='add'){el.innerHTML=`<div class="card" style="max-width:440px"><div style="font-size:16px;font-weight:500;margin-bottom:1.1rem">New account</div>${acctFlds('S.nw',S.nw,'setNewType')}<div style="display:flex;gap:8px;margin-top:1.1rem"><button onclick="cancelAdd()" class="btn" style="flex:1;justify-content:center;color:var(--t2)">Cancel</button><button onclick="createAcct()" class="btn" style="flex:2;justify-content:center;font-weight:500">Create account</button></div></div>`;return;}
  if(S.mode==='edit'){el.innerHTML=`<div class="card" style="max-width:440px"><div style="font-size:16px;font-weight:500;margin-bottom:1.1rem">Edit account</div>${acctFlds('S.ed',S.ed,'setEditType')}<div style="font-size:12px;color:var(--t2);margin-top:10px;padding:9px 12px;background:var(--s2);border-radius:var(--r);display:flex;align-items:center;gap:7px;line-height:1.5"><i class="ti ti-info-circle" style="font-size:14px;flex-shrink:0" aria-hidden="true"></i> Changing settings preserves your trade history and P&L.</div><div style="display:flex;gap:8px;margin-top:1.1rem"><button onclick="cancelEdit()" class="btn" style="flex:1;justify-content:center;color:var(--t2)">Cancel</button><button onclick="saveEdit()" class="btn" style="flex:2;justify-content:center;font-weight:500">Save changes</button></div></div>`;return;}
  const a=ga();
  el.innerHTML=a?renderDash(a):`<div style="padding:3rem;text-align:center;color:var(--t2)">Select an account from the sidebar</div>`;
}

function render(){renderSidebar();renderPanel();}

// ─── Boot ─────────────────────────────────────────────────────
(async()=>{
  await initDB();
  await load();
  render();
})();
</script>
</body>
</html>
